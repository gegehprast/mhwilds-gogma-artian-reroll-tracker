services:
  app:
    image: ghcr.io/gegehprast/mhwilds-gogma-reroll-tracker:latest
    container_name: gogma-tracker
    ports:
      - "${PORT:-5173}:80"
    volumes:
      - tracker_data:/app/apps/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  tracker_data:
